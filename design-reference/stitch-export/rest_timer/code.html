<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>IRONLOG | Rest Timer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@400;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "outline": "#8e9379",
                "error-container": "#93000a",
                "inverse-primary": "#506600",
                "surface-variant": "#353534",
                "surface-container": "#201f1f",
                "on-tertiary-fixed-variant": "#454747",
                "surface-bright": "#393939",
                "tertiary-fixed-dim": "#c6c6c7",
                "on-background": "#e5e2e1",
                "surface-container-highest": "#353534",
                "tertiary-fixed": "#e2e2e2",
                "primary-fixed": "#c3f400",
                "on-secondary-fixed": "#1a1b1f",
                "secondary-fixed": "#e3e2e7",
                "on-tertiary": "#2f3131",
                "outline-variant": "#444933",
                "surface-container-high": "#2a2a2a",
                "tertiary-container": "#e2e2e2",
                "on-error-container": "#ffdad6",
                "surface": "#131313",
                "on-secondary-container": "#b5b4ba",
                "secondary-fixed-dim": "#c6c6cb",
                "on-secondary": "#2f3034",
                "on-primary-container": "#556d00",
                "primary-container": "#c3f400",
                "surface-dim": "#131313",
                "on-secondary-fixed-variant": "#46464b",
                "surface-container-low": "#1c1b1b",
                "inverse-on-surface": "#313030",
                "surface-container-lowest": "#0e0e0e",
                "on-primary-fixed": "#161e00",
                "inverse-surface": "#e5e2e1",
                "secondary": "#c6c6cb",
                "surface-tint": "#abd600",
                "secondary-container": "#46464b",
                "on-tertiary-fixed": "#1a1c1c",
                "on-primary-fixed-variant": "#3c4d00",
                "on-surface": "#e5e2e1",
                "primary-fixed-dim": "#abd600",
                "error": "#ffb4ab",
                "on-surface-variant": "#c4c9ac",
                "on-primary": "#283500",
                "on-tertiary-container": "#636565",
                "background": "#131313",
                "primary": "#ccff00",
                "tertiary": "#ffffff",
                "on-error": "#690005"
              },
              fontFamily: {
                "headline": ["Space Grotesk"],
                "body": ["Inter"],
                "label": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-gradient {
            background: linear-gradient(180deg, #ccff00 0%, #abd600 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body antialiased overflow-hidden">
<!-- Background Layer (The Gym Context) -->
<div class="fixed inset-0 z-0 opacity-20 grayscale scale-110 blur-sm overflow-hidden">
<img alt="Dramatic industrial gym interior" class="w-full h-full object-cover" data-alt="Cinematic shot of a dark industrial gym with cast iron plates and squat racks in moody shadows and high contrast" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBiTB8kjwNSXu__aVxr7A2aFftuGaYoaAE-9NDi7zaj45IYZ7tJqGYX1UQWRILWHgXh2qbU5c1ww1AEkesvKS4svxinYY3IpuhDePsLA7oN48RPoBRo0uxC3h33X2thWWskbI6e1O5sCiRfHncg73pgHOmrnS-vaWfjPMFqfqlsdb7AAZcCFMOfjLqElNjOowUdpuNSB3HtdI6oWMLZyJqu4cdLukDVyfAnw9O0y_FWulzakcGvQOIOqogE8_j6F9V5EMN5WAUWcFY"/>
</div>
<!-- Rest Timer Overlay Canvas -->
<div class="fixed inset-0 z-50 flex flex-col items-center justify-between p-8 bg-surface/90 backdrop-blur-md">
<!-- Top Header Status -->
<div class="w-full flex justify-between items-start pt-4">
<div class="flex flex-col">
<span class="font-headline font-black text-primary text-2xl tracking-widest uppercase">IronLog</span>
<span class="font-label text-[0.6875rem] text-on-surface/60 tracking-[0.2em] uppercase mt-1">Recovery Phase</span>
</div>
<div class="text-right">
<span class="font-label text-[0.6875rem] text-on-surface/40 tracking-widest uppercase block">Next Up</span>
<span class="font-headline font-bold text-on-surface text-xl uppercase tracking-tight">Barbell Back Squat</span>
<div class="flex gap-2 justify-end mt-1">
<span class="bg-surface-container-high px-2 py-0.5 text-[0.6rem] font-bold text-primary tracking-tighter">140KG</span>
<span class="bg-surface-container-high px-2 py-0.5 text-[0.6rem] font-bold text-on-surface/80 tracking-tighter">SET 3/5</span>
</div>
</div>
</div>
<!-- Central Countdown Module -->
<div class="relative w-full flex flex-col items-center justify-center">
<!-- Progress Ring Background -->
<div class="absolute inset-0 flex items-center justify-center -z-10">
<div class="w-[85vw] h-[85vw] max-w-md max-h-md border-[16px] border-surface-container-highest rounded-full opacity-20"></div>
<!-- Animated Active Ring Fragment (Simulation) -->
<div class="absolute w-[85vw] h-[85vw] max-w-md max-h-md border-[16px] border-primary border-t-transparent border-r-transparent rounded-full rotate-45"></div>
</div>
<!-- The Big Numbers -->
<div class="flex flex-col items-center select-none">
<h1 class="font-headline text-[10rem] md:text-[14rem] font-bold leading-none tracking-tighter text-on-surface tabular-nums">
                    01:24
                </h1>
<div class="flex items-center gap-4 -mt-4">
<div class="h-[2px] w-8 bg-primary"></div>
<span class="font-label text-xs font-black uppercase tracking-[0.4em] text-primary">Resting</span>
<div class="h-[2px] w-8 bg-primary"></div>
</div>
</div>
</div>
<!-- Action Control Deck -->
<div class="w-full max-w-xl grid grid-cols-2 gap-4 pb-12">
<!-- Adjust Button (+15s) -->
<button class="flex flex-col items-center justify-center py-8 bg-surface-container-high hover:bg-surface-container-highest transition-colors active:scale-95 duration-100 rounded-lg group">
<div class="mb-2">
<span class="material-symbols-outlined text-4xl text-on-surface/80 group-hover:text-primary transition-colors">add_circle</span>
</div>
<span class="font-headline font-bold text-2xl text-on-surface">+15s</span>
<span class="font-label text-[0.65rem] text-on-surface/40 tracking-widest uppercase mt-1">Extend Rest</span>
</button>
<!-- Skip Button -->
<button class="flex flex-col items-center justify-center py-8 kinetic-gradient active:scale-95 duration-100 rounded-lg group">
<div class="mb-2">
<span class="material-symbols-outlined text-4xl text-on-primary" style="font-variation-settings: 'FILL' 1;">skip_next</span>
</div>
<span class="font-headline font-bold text-2xl text-on-primary">SKIP</span>
<span class="font-label text-[0.65rem] text-on-primary/60 tracking-widest uppercase mt-1">Start Set</span>
</button>
<!-- Secondary Actions -->
<div class="col-span-2 flex justify-between items-center px-4 mt-4">
<button class="flex items-center gap-2 py-3 px-6 bg-surface-container-low text-on-surface/60 font-label text-xs font-bold tracking-widest uppercase hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-sm">edit</span>
                    Edit Timer
                </button>
<button class="flex items-center gap-2 py-3 px-6 bg-surface-container-low text-on-surface/60 font-label text-xs font-bold tracking-widest uppercase hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-sm">notifications_off</span>
                    Mute
                </button>
</div>
</div>
<!-- Milled Detail Elements (Brutalism Aesthetic) -->
<div class="absolute top-0 right-0 w-32 h-32 opacity-10 pointer-events-none">
<svg class="w-full h-full fill-current text-on-surface" viewbox="0 0 100 100">
<rect height="2" width="100" x="0" y="0"></rect>
<rect height="2" width="100" x="0" y="10"></rect>
<rect height="2" width="100" x="0" y="20"></rect>
<rect height="2" width="100" x="0" y="30"></rect>
</svg>
</div>
<div class="absolute bottom-8 left-1/2 -translate-x-1/2 opacity-20 flex gap-1">
<div class="w-1 h-1 bg-on-surface"></div>
<div class="w-1 h-1 bg-on-surface"></div>
<div class="w-1 h-1 bg-on-surface"></div>
</div>
</div>
<!-- Notification Bar (Subtle Info) -->
<div class="fixed top-2 left-1/2 -translate-x-1/2 z-[60] px-4 py-1 bg-primary text-on-primary rounded-full">
<p class="font-label text-[10px] font-black tracking-widest uppercase">Autopause Active</p>
</div>
</body></html>
